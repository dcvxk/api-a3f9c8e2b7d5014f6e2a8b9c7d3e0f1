<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YuanBot - Sistema de Gestión</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-image: url('https://www.kali.org/wallpapers/images/2024/kali-light2.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Courier New', 'Fira Code', 'Monaco', monospace;
            min-height: 100vh;
            padding: 20px;
        }

        /* Overlay oscuro */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.75);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Terminal Style */
        .terminal {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            border: 1px solid rgba(0, 255, 65, 0.3);
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.1);
        }

        .terminal-header {
            background: rgba(30, 30, 30, 0.95);
            padding: 12px 20px;
            border-bottom: 1px solid rgba(0, 255, 65, 0.3);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .terminal-dots {
            display: flex;
            gap: 8px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .dot-red { background: #ff5f56; }
        .dot-yellow { background: #ffbd2e; }
        .dot-green { background: #27c93f; }

        .terminal-title {
            color: #00ff41;
            font-size: 12px;
            margin-left: 10px;
            font-family: monospace;
        }

        .terminal-content {
            padding: 20px;
            height: 70vh;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
        }

        /* Status Bar */
        .status-bar {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 8px;
            padding: 15px 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(0, 255, 65, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: monospace;
            font-size: 12px;
        }

        .status-label {
            color: #888;
        }

        .status-value {
            color: #00ff41;
        }

        .led {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #ff4444;
            animation: pulse 1.5s infinite;
        }

        .led.active {
            background-color: #00ff41;
            box-shadow: 0 0 8px #00ff41;
        }

        @keyframes pulse {
            0% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        /* Command Input */
        .command-line {
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(0, 255, 65, 0.3);
            padding: 15px 20px;
            display: flex;
            gap: 10px;
        }

        .prompt {
            color: #00ff41;
            font-family: monospace;
            font-size: 14px;
            white-space: nowrap;
        }

        .command-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #00ff41;
            font-family: monospace;
            font-size: 14px;
            outline: none;
        }

        .command-input::placeholder {
            color: #446644;
        }

        /* Log entries */
        .log-line {
            margin-bottom: 4px;
            padding: 2px 0;
            border-left: 2px solid transparent;
            animation: fadeIn 0.2s ease;
        }

        .log-line.info { border-left-color: #00ff41; }
        .log-line.error { border-left-color: #ff4444; color: #ff8888; }
        .log-line.success { border-left-color: #00ff88; color: #00ff88; }
        .log-line.warning { border-left-color: #ffaa00; color: #ffaa44; }
        .log-line.system { border-left-color: #0088ff; color: #66aaff; }

        .log-time {
            color: #666;
            margin-right: 12px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Modal Token */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }

        .modal-terminal {
            background: rgba(0, 0, 0, 0.95);
            border: 1px solid #00ff41;
            border-radius: 12px;
            width: 500px;
            max-width: 90%;
            overflow: hidden;
        }

        .modal-header {
            background: rgba(30, 30, 30, 0.95);
            padding: 15px 20px;
            border-bottom: 1px solid #00ff41;
        }

        .modal-header h3 {
            color: #00ff41;
            font-family: monospace;
            font-size: 16px;
        }

        .modal-body {
            padding: 30px;
        }

        .modal-body p {
            color: #ccc;
            margin-bottom: 20px;
            font-family: monospace;
        }

        .token-field {
            width: 100%;
            background: #0a0a0a;
            border: 1px solid #00ff41;
            color: #00ff41;
            padding: 12px;
            font-family: monospace;
            font-size: 13px;
            border-radius: 4px;
            margin-bottom: 20px;
        }

        .token-field:focus {
            outline: none;
            box-shadow: 0 0 10px rgba(0,255,65,0.2);
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
        }

        .btn-terminal {
            background: transparent;
            border: 1px solid #00ff41;
            color: #00ff41;
            padding: 10px 20px;
            font-family: monospace;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .btn-terminal:hover {
            background: #00ff41;
            color: #0a0a0a;
        }

        .btn-terminal-secondary {
            border-color: #ffaa00;
            color: #ffaa44;
        }

        .btn-terminal-secondary:hover {
            background: #ffaa00;
            color: #0a0a0a;
        }

        /* Scrollbar */
        .terminal-content::-webkit-scrollbar {
            width: 8px;
        }

        .terminal-content::-webkit-scrollbar-track {
            background: #0a0a0a;
        }

        .terminal-content::-webkit-scrollbar-thumb {
            background: #00ff41;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-bar">
            <div class="status-item">
                <span class="status-label">[SYSTEM]</span>
                <span class="status-value">YUAN_BOT</span>
            </div>
            <div class="status-item">
                <span class="status-label">[STATUS]</span>
                <span class="status-value" id="botStatusText">OFFLINE</span>
                <div class="led" id="statusLed"></div>
            </div>
            <div class="status-item">
                <span class="status-label">[GITHUB]</span>
                <span class="status-value" id="githubStatus">NOT_CONFIGURED</span>
            </div>
            <div class="status-item">
                <span class="status-label">[PRODUCTS]</span>
                <span class="status-value" id="productCount">0</span>
            </div>
        </div>

        <div class="terminal">
            <div class="terminal-header">
                <div class="terminal-dots">
                    <div class="dot dot-red"></div>
                    <div class="dot dot-yellow"></div>
                    <div class="dot dot-green"></div>
                </div>
                <div class="terminal-title">root@yuan-bot:~/system</div>
            </div>
            <div class="terminal-content" id="terminalContent">
                <div class="log-line system">
                    <span class="log-time"></span> [BOOT] Initializing YuanBot System...
                </div>
                <div class="log-line system">
                    <span class="log-time"></span> [BOOT] Loading configuration...
                </div>
            </div>
            <div class="command-line">
                <span class="prompt">root@yuan-bot:~$</span>
                <input type="text" id="commandInput" class="command-input" placeholder="type command... (help for commands)" autocomplete="off">
            </div>
        </div>
    </div>

    <!-- Modal Token -->
    <div id="tokenModal" class="modal">
        <div class="modal-terminal">
            <div class="modal-header">
                <h3>>_ AUTHENTICATION_REQUIRED</h3>
            </div>
            <div class="modal-body">
                <p>[!] GitHub Personal Access Token required</p>
                <p style="font-size: 11px; color: #ffaa44;">[*] Token will be stored in local storage</p>
                <input type="password" id="tokenInput" class="token-field" placeholder="Enter GitHub token...">
                <div class="modal-buttons">
                    <button class="btn-terminal" onclick="saveToken()">[ AUTHENTICATE ]</button>
                    <button class="btn-terminal btn-terminal-secondary" onclick="skipToken()">[ READ_ONLY_MODE ]</button>
                </div>
                <div id="tokenMessage" style="margin-top: 15px; font-size: 11px;"></div>
            </div>
        </div>
    </div>

    <script>
        // ===== CONFIGURATION =====
        const BOT_TOKEN = "8762418416:AAH02l_pssUwIM1uzyD2VmdK6NZ3tvPo398";
        const REPO_OWNER = "dcvxk";
        const REPO_NAME = "Yuan24-7.github.io";
        const FILE_PATH = "productos.json";
        
        let GITHUB_TOKEN = null;
        let botActive = false;
        let pollingInterval = null;
        let lastUpdateId = 0;
        let productosCache = null;
        let cacheTimestamp = 0;
        let userSessions = {};
        
        const API_URL = `https://api.telegram.org/bot${BOT_TOKEN}`;
        const RAW_URL = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/${FILE_PATH}`;
        const GITHUB_API_URL = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`;

        function addLog(message, type = 'info') {
            const terminal = document.getElementById('terminalContent');
            const logLine = document.createElement('div');
            logLine.className = `log-line ${type}`;
            const timestamp = new Date().toLocaleTimeString();
            logLine.innerHTML = `<span class="log-time">[${timestamp}]</span> ${message}`;
            terminal.appendChild(logLine);
            logLine.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            while (terminal.children.length > 500) terminal.removeChild(terminal.firstChild);
        }

        function updateStatusBar() {
            const botStatusSpan = document.getElementById('botStatusText');
            const led = document.getElementById('statusLed');
            const githubSpan = document.getElementById('githubStatus');
            const productSpan = document.getElementById('productCount');
            
            if (botActive) {
                botStatusSpan.textContent = 'ONLINE';
                led.classList.add('active');
            } else {
                botStatusSpan.textContent = 'OFFLINE';
                led.classList.remove('active');
            }
            
            if (GITHUB_TOKEN) {
                githubSpan.textContent = 'CONNECTED';
                githubSpan.style.color = '#00ff41';
            } else {
                githubSpan.textContent = 'READ_ONLY';
                githubSpan.style.color = '#ffaa44';
            }
            
            if (productosCache) {
                productSpan.textContent = productosCache.length;
            }
        }

        function saveToken() {
            const tokenInput = document.getElementById('tokenInput');
            const token = tokenInput.value.trim();
            
            if (!token) {
                document.getElementById('tokenMessage').innerHTML = '[*] ERROR: Empty token';
                document.getElementById('tokenMessage').style.color = '#ff4444';
                return;
            }
            
            if (!token.startsWith('ghp_') && !token.startsWith('github_pat_')) {
                document.getElementById('tokenMessage').innerHTML = '[*] ERROR: Invalid token format';
                document.getElementById('tokenMessage').style.color = '#ff4444';
                return;
            }
            
            localStorage.setItem('github_token', token);
            GITHUB_TOKEN = token;
            
            document.getElementById('tokenMessage').innerHTML = '[*] AUTHENTICATING...';
            document.getElementById('tokenMessage').style.color = '#ffaa44';
            
            setTimeout(() => {
                document.getElementById('tokenModal').style.display = 'none';
                addLog('[*] GitHub token configured', 'success');
                testToken();
                obtenerProductos();
                updateStatusBar();
            }, 1000);
        }

        function skipToken() {
            document.getElementById('tokenModal').style.display = 'none';
            GITHUB_TOKEN = null;
            addLog('[!] Read-only mode activated', 'warning');
            addLog('[*] Changes will not be saved to GitHub', 'warning');
            obtenerProductos();
            updateStatusBar();
        }

        function loadSavedToken() {
            const savedToken = localStorage.getItem('github_token');
            if (savedToken && (savedToken.startsWith('ghp_') || savedToken.startsWith('github_pat_'))) {
                GITHUB_TOKEN = savedToken;
                document.getElementById('tokenModal').style.display = 'none';
                addLog('[*] Loading stored token...', 'info');
                testToken();
                return true;
            }
            return false;
        }

        async function testToken() {
            if (!GITHUB_TOKEN) return false;
            
            try {
                addLog('[*] Testing GitHub authentication...', 'info');
                const response = await fetch('https://api.github.com/user', {
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                
                if (response.ok) {
                    const user = await response.json();
                    addLog(`[*] Authentication successful - Owner: ${user.login}`, 'success');
                    updateStatusBar();
                    return true;
                } else {
                    addLog('[!] Authentication failed - Invalid token', 'error');
                    GITHUB_TOKEN = null;
                    localStorage.removeItem('github_token');
                    updateStatusBar();
                    return false;
                }
            } catch (error) {
                addLog(`[!] Connection error: ${error.message}`, 'error');
                return false;
            }
        }

        async function obtenerProductos(forceRefresh = false) {
            const now = Date.now() / 1000;
            
            if (!forceRefresh && productosCache && (now - cacheTimestamp) < 30) {
                addLog(`[*] Using cache (${productosCache.length} products)`, 'info');
                return productosCache;
            }
            
            try {
                addLog('[*] Fetching products from GitHub...', 'info');
                const response = await fetch(RAW_URL);
                
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const data = await response.json();
                
                if (data && data.products) {
                    productosCache = data.products;
                    cacheTimestamp = now;
                    addLog(`[*] Loaded ${productosCache.length} products`, 'success');
                    updateStatusBar();
                    return productosCache;
                }
                
                productosCache = [];
                return [];
                
            } catch (error) {
                addLog(`[!] Error loading products: ${error.message}`, 'error');
                return productosCache || [];
            }
        }

        async function actualizarGitHub(productos) {
            if (!GITHUB_TOKEN) {
                addLog('[!] Read-only mode - Changes not saved', 'warning');
                return false;
            }
            
            try {
                addLog('[*] Saving changes to GitHub...', 'info');
                
                const getResponse = await fetch(GITHUB_API_URL, {
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                
                let sha = null;
                if (getResponse.ok) {
                    const data = await getResponse.json();
                    sha = data.sha;
                }
                
                const dataToUpload = { products: productos };
                const contenidoJson = JSON.stringify(dataToUpload, null, 2);
                const contenidoBase64 = btoa(unescape(encodeURIComponent(contenidoJson)));
                
                const putData = {
                    message: `Updated by bot - ${new Date().toLocaleString()}`,
                    content: contenidoBase64,
                    branch: "main"
                };
                
                if (sha) putData.sha = sha;
                
                const putResponse = await fetch(GITHUB_API_URL, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(putData)
                });
                
                if (putResponse.ok) {
                    cacheTimestamp = 0;
                    addLog('[*] Changes saved successfully', 'success');
                    return true;
                } else {
                    const error = await putResponse.json();
                    addLog(`[!] GitHub error: ${error.message}`, 'error');
                    return false;
                }
            } catch (error) {
                addLog(`[!] Save error: ${error.message}`, 'error');
                return false;
            }
        }

        // ===== TELEGRAM BOT FUNCTIONS =====
        async function sendMessage(chatId, text, replyMarkup = null) {
            const payload = {
                chat_id: chatId,
                text: text,
                parse_mode: 'HTML'
            };
            if (replyMarkup) payload.reply_markup = JSON.stringify(replyMarkup);
            
            try {
                await fetch(`${API_URL}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
            } catch (error) {
                addLog(`[!] Send error: ${error.message}`, 'error');
            }
        }

        async function sendMainMenu(chatId) {
            const keyboard = {
                inline_keyboard: [
                    [{ text: "VIEW PRODUCTS", callback_data: "list_products" }],
                    [{ text: "MODIFY PRODUCT", callback_data: "modify_product_start" }],
                    [{ text: "STATISTICS", callback_data: "stats" }],
                    [{ text: "REFRESH DATA", callback_data: "refresh" }],
                    [{ text: "HELP", callback_data: "help" }]
                ]
            };
            
            const productos = await obtenerProductos();
            const total = productos ? productos.length : 0;
            
            const message = `<b>YUAN BOT - PRODUCT MANAGEMENT</b>\n\n` +
                           `Products: ${total}\n` +
                           `GitHub: ${GITHUB_TOKEN ? "READY" : "READ ONLY"}\n` +
                           `Time: ${new Date().toLocaleTimeString()}\n\n` +
                           `Select an option:`;
            
            await sendMessage(chatId, message, keyboard);
        }

        async function listProducts(chatId, page = 0) {
            const productos = await obtenerProductos();
            if (!productos || productos.length === 0) {
                await sendMessage(chatId, "No products available");
                return;
            }
            
            const itemsPerPage = 5;
            const totalPages = Math.ceil(productos.length / itemsPerPage);
            const startIdx = page * itemsPerPage;
            const endIdx = Math.min(startIdx + itemsPerPage, productos.length);
            
            let message = `<b>PRODUCT CATALOG</b>\n`;
            message += `━━━━━━━━━━━━━━━━━━━━━\n`;
            message += `Page ${page + 1} of ${totalPages}\n`;
            message += `Total: ${productos.length} products\n`;
            message += `━━━━━━━━━━━━━━━━━━━━━\n\n`;
            
            for (let i = startIdx; i < endIdx; i++) {
                const p = productos[i];
                message += `<b>${i+1}. ${p.name || 'N/A'}</b>\n`;
                message += `ID: ${p.ID || 'N/A'}\n`;
                message += `Price: ${p.price || 'N/A'}\n`;
                message += `Brand: ${p.brand || 'N/A'}\n`;
                message += `Shipping: ${p.shipping || 'N/A'}\n\n`;
            }
            
            const keyboard = { inline_keyboard: [] };
            const navButtons = [];
            if (page > 0) navButtons.push({ text: "PREV", callback_data: `page_${page-1}` });
            if (page < totalPages - 1) navButtons.push({ text: "NEXT", callback_data: `page_${page+1}` });
            if (navButtons.length > 0) keyboard.inline_keyboard.push(navButtons);
            keyboard.inline_keyboard.push([{ text: "MAIN MENU", callback_data: "main_menu" }]);
            
            await sendMessage(chatId, message, keyboard);
        }

        async function showStats(chatId) {
            const productos = await obtenerProductos();
            if (!productos || productos.length === 0) {
                await sendMessage(chatId, "No data available");
                return;
            }
            
            const marcas = {};
            const precios = [];
            
            for (const p of productos) {
                const marca = p.brand || 'Unknown';
                marcas[marca] = (marcas[marca] || 0) + 1;
                const precio = parseFloat((p.price || '0').replace('$', ''));
                if (!isNaN(precio)) precios.push(precio);
            }
            
            const marcaTop = Object.keys(marcas).reduce((a, b) => marcas[a] > marcas[b] ? a : b, 'N/A');
            const precioMin = precios.length ? Math.min(...precios) : 0;
            const precioMax = precios.length ? Math.max(...precios) : 0;
            const precioProm = precios.length ? precios.reduce((a,b) => a+b, 0) / precios.length : 0;
            
            const message = `<b>SYSTEM STATISTICS</b>\n\n` +
                           `Total products: ${productos.length}\n` +
                           `Unique brands: ${Object.keys(marcas).length}\n` +
                           `Most common brand: ${marcaTop}\n\n` +
                           `PRICES\n` +
                           `Min: $${precioMin.toFixed(2)}\n` +
                           `Max: $${precioMax.toFixed(2)}\n` +
                           `Avg: $${precioProm.toFixed(2)}`;
            
            const keyboard = { inline_keyboard: [[{ text: "MAIN MENU", callback_data: "main_menu" }]] };
            await sendMessage(chatId, message, keyboard);
        }

        async function modifyProductSelection(chatId) {
            const productos = await obtenerProductos();
            if (!productos || productos.length === 0) {
                await sendMessage(chatId, "No products available");
                return;
            }
            
            const keyboard = { inline_keyboard: [] };
            for (let i = 0; i < Math.min(productos.length, 10); i++) {
                keyboard.inline_keyboard.push([{
                    text: `${productos[i].ID} - ${productos[i].name.substring(0, 30)}`,
                    callback_data: `select_${productos[i].ID}`
                }]);
            }
            keyboard.inline_keyboard.push([{ text: "MAIN MENU", callback_data: "main_menu" }]);
            
            await sendMessage(chatId, "SELECT PRODUCT TO MODIFY", keyboard);
        }

        async function showModifyOptions(chatId, productId) {
            const productos = await obtenerProductos();
            const producto = productos.find(p => p.ID === productId);
            
            if (!producto) {
                await sendMessage(chatId, "Product not found");
                return;
            }
            
            userSessions[chatId] = { productId: productId };
            
            const message = `MODIFY: ${producto.name}\n\n` +
                           `Price: ${producto.price}\n` +
                           `Shipping: ${producto.shipping}\n\n` +
                           `What to modify?`;
            
            const keyboard = {
                inline_keyboard: [
                    [{ text: "PRICE", callback_data: `modify_price_${productId}` }],
                    [{ text: "SHIPPING", callback_data: `modify_shipping_${productId}` }],
                    [{ text: "BACK", callback_data: "modify_product_start" }],
                    [{ text: "MAIN MENU", callback_data: "main_menu" }]
                ]
            };
            
            await sendMessage(chatId, message, keyboard);
        }

        async function processPriceChange(chatId, productId, newPrice) {
            let priceStr = newPrice.replace('$', '');
            const priceNum = parseFloat(priceStr);
            
            if (isNaN(priceNum) || priceNum < 0) {
                await sendMessage(chatId, "Invalid price");
                return;
            }
            
            const formattedPrice = `$${priceNum.toFixed(2)}`;
            const productos = await obtenerProductos();
            const index = productos.findIndex(p => p.ID === productId);
            
            if (index === -1) {
                await sendMessage(chatId, `Product ${productId} not found`);
                return;
            }
            
            const oldPrice = productos[index].price;
            productos[index].price = formattedPrice;
            
            if (await actualizarGitHub(productos)) {
                await sendMessage(chatId, `PRICE UPDATED\n\nProduct: ${productos[index].name}\nBefore: ${oldPrice}\nNow: ${formattedPrice}`);
            } else {
                await sendMessage(chatId, "Error saving to GitHub");
            }
        }

        async function processShippingChange(chatId, productId, newShipping) {
            let shippingStr = newShipping.replace('$', '');
            const shippingNum = parseFloat(shippingStr);
            
            if (isNaN(shippingNum) || shippingNum < 0) {
                await sendMessage(chatId, "Invalid shipping cost");
                return;
            }
            
            const formattedShipping = `$${shippingNum.toFixed(2)}`;
            const productos = await obtenerProductos();
            const index = productos.findIndex(p => p.ID === productId);
            
            if (index === -1) {
                await sendMessage(chatId, `Product ${productId} not found`);
                return;
            }
            
            const oldShipping = productos[index].shipping;
            productos[index].shipping = formattedShipping;
            
            if (await actualizarGitHub(productos)) {
                await sendMessage(chatId, `SHIPPING UPDATED\n\nProduct: ${productos[index].name}\nBefore: ${oldShipping}\nNow: ${formattedShipping}`);
            } else {
                await sendMessage(chatId, "Error saving to GitHub");
            }
        }

        async function handleCallback(callbackQuery) {
            const chatId = callbackQuery.message?.chat?.id;
            if (!chatId) return;
            
            const data = callbackQuery.data;
            
            try {
                await fetch(`${API_URL}/answerCallbackQuery`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ callback_query_id: callbackQuery.id })
                });
            } catch (e) {}
            
            if (data === "main_menu") await sendMainMenu(chatId);
            else if (data === "list_products") await listProducts(chatId, 0);
            else if (data === "modify_product_start") await modifyProductSelection(chatId);
            else if (data === "stats") await showStats(chatId);
            else if (data === "refresh") {
                await obtenerProductos(true);
                await sendMessage(chatId, "Data refreshed");
                await sendMainMenu(chatId);
            }
            else if (data === "help") {
                const helpMsg = `COMMANDS\n\n` +
                               `/start - Main menu\n/list - List products\n/stats - Statistics\n` +
                               `/change ID price - Change price\n/shipping ID cost - Change shipping`;
                await sendMessage(chatId, helpMsg);
            }
            else if (data.startsWith("page_")) {
                const page = parseInt(data.split("_")[1]);
                await listProducts(chatId, page);
            }
            else if (data.startsWith("select_")) {
                const productId = data.replace("select_", "");
                await showModifyOptions(chatId, productId);
            }
            else if (data.startsWith("modify_price_")) {
                const productId = data.replace("modify_price_", "");
                userSessions[chatId] = { action: 'waiting_price', productId: productId };
                await sendMessage(chatId, "Enter new price (example: 45.99):");
            }
            else if (data.startsWith("modify_shipping_")) {
                const productId = data.replace("modify_shipping_", "");
                userSessions[chatId] = { action: 'waiting_shipping', productId: productId };
                await sendMessage(chatId, "Enter new shipping cost (example: 5.99):");
            }
        }

        async function handleMessage(message) {
            const chatId = message.chat.id;
            const text = message.text;
            
            if (!text) return;
            
            if (text === '/start') await sendMainMenu(chatId);
            else if (text === '/list') await listProducts(chatId, 0);
            else if (text === '/stats') await showStats(chatId);
            else if (text === '/cancel') {
                delete userSessions[chatId];
                await sendMessage(chatId, "Operation cancelled");
                await sendMainMenu(chatId);
            }
            else if (text.startsWith('/change')) {
                const parts = text.split(' ');
                if (parts.length !== 3) await sendMessage(chatId, "Usage: /change ID price");
                else await processPriceChange(chatId, parts[1], parts[2]);
            }
            else if (text.startsWith('/shipping')) {
                const parts = text.split(' ');
                if (parts.length !== 3) await sendMessage(chatId, "Usage: /shipping ID cost");
                else await processShippingChange(chatId, parts[1], parts[2]);
            }
            else if (userSessions[chatId]) {
                const session = userSessions[chatId];
                if (session.action === 'waiting_price') {
                    await processPriceChange(chatId, session.productId, text);
                    delete userSessions[chatId];
                } else if (session.action === 'waiting_shipping') {
                    await processShippingChange(chatId, session.productId, text);
                    delete userSessions[chatId];
                }
            }
        }

        async function pollTelegram() {
            if (!botActive) return;
            
            try {
                const url = `${API_URL}/getUpdates?timeout=30&offset=${lastUpdateId + 1}`;
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.ok && data.result) {
                    for (const update of data.result) {
                        if (update.update_id > lastUpdateId) {
                            lastUpdateId = update.update_id;
                            if (update.message) await handleMessage(update.message);
                            if (update.callback_query) await handleCallback(update.callback_query);
                        }
                    }
                }
            } catch (error) {
                addLog(`[!] Polling error: ${error.message}`, 'error');
            }
        }

        function startBot() {
            if (botActive) {
                addLog('[!] Bot already running', 'warning');
                return;
            }
            
            botActive = true;
            if (pollingInterval) clearInterval(pollingInterval);
            pollingInterval = setInterval(pollTelegram, 1000);
            updateStatusBar();
            addLog('[*] Telegram bot started', 'success');
            addLog('[*] Waiting for commands...', 'info');
        }

        function stopBot() {
            botActive = false;
            if (pollingInterval) clearInterval(pollingInterval);
            updateStatusBar();
            addLog('[!] Bot stopped', 'warning');
        }

        function sendCommand() {
            const input = document.getElementById('commandInput');
            const command = input.value.trim();
            if (command === 'help') {
                addLog('Available commands: start, stop, status, clear', 'info');
            } else if (command === 'start') {
                startBot();
            } else if (command === 'stop') {
                stopBot();
            } else if (command === 'status') {
                addLog(`Bot status: ${botActive ? 'ONLINE' : 'OFFLINE'}`, 'info');
                addLog(`GitHub: ${GITHUB_TOKEN ? 'CONNECTED' : 'READ ONLY'}`, 'info');
                addLog(`Products: ${productosCache ? productosCache.length : 0}`, 'info');
            } else if (command === 'clear') {
                document.getElementById('terminalContent').innerHTML = '';
                addLog('[*] Terminal cleared', 'info');
            } else if (command) {
                addLog(`[!] Unknown command: ${command}. Type 'help' for available commands`, 'warning');
            }
            input.value = '';
        }

        document.getElementById('commandInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendCommand();
        });

        // Initialization
        window.addEventListener('load', async () => {
            addLog('[*] YuanBot System v1.0', 'success');
            addLog('[*] Initializing modules...', 'info');
            addLog('[*] Connecting to GitHub API...', 'info');
            
            const hasToken = loadSavedToken();
            
            if (!hasToken) {
                addLog('[!] GitHub token required for write access', 'warning');
            } else {
                addLog('[*] Token loaded from storage', 'info');
                await obtenerProductos();
                addLog('[*] System ready', 'success');
                setTimeout(() => startBot(), 1000);
            }
            
            updateStatusBar();
        });
    </script>
</body>
