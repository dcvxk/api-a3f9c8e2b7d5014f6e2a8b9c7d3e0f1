<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YuanBot - 管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-image: url('https://www.kali.org/wallpapers/images/2024/kali-light2.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Courier New', 'Fira Code', 'Monaco', monospace;
            min-height: 100vh;
            padding: 20px;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.82);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Kali Linux Terminal Style */
        .terminal {
            background: rgba(0, 0, 0, 0.88);
            backdrop-filter: blur(8px);
            border-radius: 8px;
            border: 1px solid rgba(85, 85, 85, 0.5);
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .terminal-header {
            background: rgba(45, 45, 45, 0.95);
            padding: 10px 15px;
            border-bottom: 1px solid #3a3a3a;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .terminal-dots {
            display: flex;
            gap: 8px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .dot-red { background: #ff5f56; }
        .dot-yellow { background: #ffbd2e; }
        .dot-green { background: #27c93f; }

        .terminal-title {
            color: #bbbbbb;
            font-size: 11px;
            margin-left: 10px;
            font-family: monospace;
        }

        .terminal-content {
            padding: 15px;
            height: 68vh;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.5;
            color: #00ff41;
        }

        /* Status Bar Kali Style */
        .status-bar {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 6px;
            padding: 10px 15px;
            margin-bottom: 15px;
            border: 1px solid #3a3a3a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: monospace;
            font-size: 11px;
        }

        .status-label {
            color: #888;
        }

        .status-value {
            color: #00ff41;
        }

        .led {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #ff4444;
            animation: pulse 1.5s infinite;
        }

        .led.active {
            background-color: #00ff41;
            box-shadow: 0 0 6px #00ff41;
        }

        @keyframes pulse {
            0% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        /* Command Line Kali Style */
        .command-line {
            background: rgba(0, 0, 0, 0.9);
            border-top: 1px solid #3a3a3a;
            padding: 12px 15px;
            display: flex;
            gap: 10px;
        }

        .prompt {
            color: #00ff41;
            font-family: monospace;
            font-size: 13px;
            white-space: nowrap;
        }

        .prompt-user {
            color: #00ff41;
        }

        .prompt-at {
            color: #888;
        }

        .prompt-host {
            color: #ffaa00;
        }

        .prompt-path {
            color: #0088ff;
        }

        .command-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #00ff41;
            font-family: monospace;
            font-size: 13px;
            outline: none;
        }

        .command-input::placeholder {
            color: #446644;
        }

        /* Log lines */
        .log-line {
            margin-bottom: 3px;
            padding: 2px 0;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .log-line .prefix {
            color: #888;
            margin-right: 10px;
        }

        .log-line.info { color: #00ff41; }
        .log-line.error { color: #ff4444; }
        .log-line.success { color: #00ff88; }
        .log-line.warning { color: #ffaa44; }
        .log-line.system { color: #66aaff; }

        /* Scrollbar Kali Style */
        .terminal-content::-webkit-scrollbar {
            width: 8px;
        }

        .terminal-content::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        .terminal-content::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 4px;
        }

        .terminal-content::-webkit-scrollbar-thumb:hover {
            background: #888;
        }

        /* Modal Token Kali Style */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }

        .modal-terminal {
            background: #0a0a0a;
            border: 1px solid #3a3a3a;
            border-radius: 8px;
            width: 520px;
            max-width: 90%;
            overflow: hidden;
        }

        .modal-header {
            background: #2d2d2d;
            padding: 12px 20px;
            border-bottom: 1px solid #3a3a3a;
        }

        .modal-header h3 {
            color: #00ff41;
            font-family: monospace;
            font-size: 13px;
        }

        .modal-body {
            padding: 25px;
        }

        .modal-body p {
            color: #ccc;
            margin-bottom: 15px;
            font-family: monospace;
            font-size: 12px;
        }

        .token-field {
            width: 100%;
            background: #0a0a0a;
            border: 1px solid #3a3a3a;
            color: #00ff41;
            padding: 10px 12px;
            font-family: monospace;
            font-size: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
        }

        .token-field:focus {
            outline: none;
            border-color: #00ff41;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
        }

        .btn-terminal {
            background: transparent;
            border: 1px solid #00ff41;
            color: #00ff41;
            padding: 8px 18px;
            font-family: monospace;
            font-size: 12px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .btn-terminal:hover {
            background: #00ff41;
            color: #0a0a0a;
        }

        .btn-terminal-secondary {
            border-color: #ffaa44;
            color: #ffaa44;
        }

        .btn-terminal-secondary:hover {
            background: #ffaa44;
            color: #0a0a0a;
        }

        /* Blinking cursor effect */
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-bar">
            <div class="status-item">
                <span class="status-label">┌─[</span>
                <span class="status-value">YUAN_BOT</span>
                <span class="status-label">]</span>
            </div>
            <div class="status-item">
                <span class="status-label">├─[</span>
                <span class="status-value" id="botStatusText">OFFLINE</span>
                <span class="status-label">]</span>
                <div class="led" id="statusLed"></div>
            </div>
            <div class="status-item">
                <span class="status-label">├─[</span>
                <span class="status-value" id="githubStatus">NOT_CONFIGURED</span>
                <span class="status-label">]</span>
            </div>
            <div class="status-item">
                <span class="status-label">└─[</span>
                <span class="status-value" id="productCount">0</span>
                <span class="status-label"> PRODUCTS]</span>
            </div>
        </div>

        <div class="terminal">
            <div class="terminal-header">
                <div class="terminal-dots">
                    <div class="dot dot-red"></div>
                    <div class="dot dot-yellow"></div>
                    <div class="dot dot-green"></div>
                </div>
                <div class="terminal-title">kali@yuan-bot:~/system</div>
            </div>
            <div class="terminal-content" id="terminalContent">
                <div class="log-line system">
                    <span class="prefix">┌─[</span> SYSTEM INITIALIZATION <span class="prefix">]</span>
                </div>
                <div class="log-line system">
                    <span class="prefix">│</span>
                </div>
                <div class="log-line system">
                    <span class="prefix">└─[</span> Loading YuanBot v1.0 <span class="prefix">]</span>
                </div>
            </div>
            <div class="command-line">
                <span class="prompt">
                    <span class="prompt-user">kali</span>
                    <span class="prompt-at">@</span>
                    <span class="prompt-host">yuan-bot</span>
                    <span class="prompt-path">:~$</span>
                </span>
                <input type="text" id="commandInput" class="command-input" placeholder="type 'help' for commands" autocomplete="off">
            </div>
        </div>
    </div>

    <!-- Modal Token -->
    <div id="tokenModal" class="modal">
        <div class="modal-terminal">
            <div class="modal-header">
                <h3>┌─[ GITHUB AUTHENTICATION ]</h3>
            </div>
            <div class="modal-body">
                <p>│</p>
                <p>├─[ ! ] Personal Access Token Required</p>
                <p>│</p>
                <p>├─[ * ] Token will be stored locally</p>
                <p>│</p>
                <input type="password" id="tokenInput" class="token-field" placeholder="└─[ Enter GitHub token ]─">
                <div class="modal-buttons">
                    <button class="btn-terminal" onclick="saveToken()">┌─[ AUTHENTICATE ]</button>
                    <button class="btn-terminal btn-terminal-secondary" onclick="skipToken()">└─[ READ ONLY ]</button>
                </div>
                <div id="tokenMessage" style="margin-top: 15px; font-size: 11px;"></div>
            </div>
        </div>
    </div>

    <script>
        // ===== CONFIGURATION =====
        const BOT_TOKEN = "8762418416:AAH02l_pssUwIM1uzyD2VmdK6NZ3tvPo398";
        const REPO_OWNER = "dcvxk";
        const REPO_NAME = "Yuan24-7.github.io";
        const FILE_PATH = "productos.json";
        
        let GITHUB_TOKEN = null;
        let botActive = false;
        let pollingInterval = null;
        let lastUpdateId = 0;
        let productosCache = null;
        let cacheTimestamp = 0;
        let userSessions = {};
        
        const API_URL = `https://api.telegram.org/bot${BOT_TOKEN}`;
        const RAW_URL = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/${FILE_PATH}`;
        const GITHUB_API_URL = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`;

        function addLog(message, type = 'info') {
            const terminal = document.getElementById('terminalContent');
            const logLine = document.createElement('div');
            logLine.className = `log-line ${type}`;
            const timestamp = new Date().toLocaleTimeString();
            logLine.innerHTML = `<span class="prefix">[${timestamp}]</span> ${message}`;
            terminal.appendChild(logLine);
            logLine.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            while (terminal.children.length > 500) terminal.removeChild(terminal.firstChild);
        }

        function updateStatusBar() {
            const botStatusSpan = document.getElementById('botStatusText');
            const led = document.getElementById('statusLed');
            const githubSpan = document.getElementById('githubStatus');
            const productSpan = document.getElementById('productCount');
            
            if (botActive) {
                botStatusSpan.textContent = 'ONLINE';
                led.classList.add('active');
            } else {
                botStatusSpan.textContent = 'OFFLINE';
                led.classList.remove('active');
            }
            
            if (GITHUB_TOKEN) {
                githubSpan.textContent = 'CONNECTED';
                githubSpan.style.color = '#00ff41';
            } else {
                githubSpan.textContent = 'READ_ONLY';
                githubSpan.style.color = '#ffaa44';
            }
            
            if (productosCache) {
                productSpan.textContent = productosCache.length;
            }
        }

        function saveToken() {
            const tokenInput = document.getElementById('tokenInput');
            const token = tokenInput.value.trim();
            
            if (!token) {
                document.getElementById('tokenMessage').innerHTML = '│\n└─[ ERROR: Empty token ]';
                document.getElementById('tokenMessage').style.color = '#ff4444';
                return;
            }
            
            if (!token.startsWith('ghp_') && !token.startsWith('github_pat_')) {
                document.getElementById('tokenMessage').innerHTML = '│\n└─[ ERROR: Invalid token format ]';
                document.getElementById('tokenMessage').style.color = '#ff4444';
                return;
            }
            
            localStorage.setItem('github_token', token);
            GITHUB_TOKEN = token;
            
            document.getElementById('tokenMessage').innerHTML = '│\n└─[ AUTHENTICATING... ]';
            document.getElementById('tokenMessage').style.color = '#ffaa44';
            
            setTimeout(() => {
                document.getElementById('tokenModal').style.display = 'none';
                addLog('┌─[ GitHub Token Configured ]', 'success');
                addLog('└─[ Testing connection... ]', 'info');
                testToken();
                obtenerProductos();
                updateStatusBar();
            }, 1000);
        }

        function skipToken() {
            document.getElementById('tokenModal').style.display = 'none';
            GITHUB_TOKEN = null;
            addLog('┌─[ WARNING: Read Only Mode ]', 'warning');
            addLog('└─[ Changes will not be saved to GitHub ]', 'warning');
            obtenerProductos();
            updateStatusBar();
        }

        function loadSavedToken() {
            const savedToken = localStorage.getItem('github_token');
            if (savedToken && (savedToken.startsWith('ghp_') || savedToken.startsWith('github_pat_'))) {
                GITHUB_TOKEN = savedToken;
                document.getElementById('tokenModal').style.display = 'none';
                addLog('┌─[ Loading stored token... ]', 'info');
                addLog('└─[ Token loaded from storage ]', 'success');
                testToken();
                return true;
            }
            return false;
        }

        async function testToken() {
            if (!GITHUB_TOKEN) return false;
            
            try {
                addLog('├─[ Testing GitHub authentication... ]', 'info');
                const response = await fetch('https://api.github.com/user', {
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                
                if (response.ok) {
                    const user = await response.json();
                    addLog(`├─[ Authentication successful ]`, 'success');
                    addLog(`└─[ Owner: ${user.login} ]`, 'success');
                    updateStatusBar();
                    return true;
                } else {
                    addLog('└─[ ERROR: Authentication failed - Invalid token ]', 'error');
                    GITHUB_TOKEN = null;
                    localStorage.removeItem('github_token');
                    updateStatusBar();
                    return false;
                }
            } catch (error) {
                addLog(`└─[ ERROR: Connection failed - ${error.message} ]`, 'error');
                return false;
            }
        }

        async function obtenerProductos(forceRefresh = false) {
            const now = Date.now() / 1000;
            
            if (!forceRefresh && productosCache && (now - cacheTimestamp) < 30) {
                addLog(`[*] Using cache (${productosCache.length} products)`, 'info');
                return productosCache;
            }
            
            try {
                addLog('[*] Fetching products from GitHub...', 'info');
                const response = await fetch(RAW_URL);
                
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const data = await response.json();
                
                if (data && data.products) {
                    productosCache = data.products;
                    cacheTimestamp = now;
                    addLog(`[*] Loaded ${productosCache.length} products`, 'success');
                    updateStatusBar();
                    return productosCache;
                }
                
                productosCache = [];
                return [];
                
            } catch (error) {
                addLog(`[!] Error loading products: ${error.message}`, 'error');
                return productosCache || [];
            }
        }

        async function actualizarGitHub(productos) {
            if (!GITHUB_TOKEN) {
                addLog('[!] Read-only mode - Changes not saved', 'warning');
                return false;
            }
            
            try {
                addLog('[*] Saving changes to GitHub...', 'info');
                
                const getResponse = await fetch(GITHUB_API_URL, {
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                
                let sha = null;
                if (getResponse.ok) {
                    const data = await getResponse.json();
                    sha = data.sha;
                }
                
                const dataToUpload = { products: productos };
                const contenidoJson = JSON.stringify(dataToUpload, null, 2);
                const contenidoBase64 = btoa(unescape(encodeURIComponent(contenidoJson)));
                
                const putData = {
                    message: `Updated by bot - ${new Date().toLocaleString()}`,
                    content: contenidoBase64,
                    branch: "main"
                };
                
                if (sha) putData.sha = sha;
                
                const putResponse = await fetch(GITHUB_API_URL, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(putData)
                });
                
                if (putResponse.ok) {
                    cacheTimestamp = 0;
                    addLog('[*] Changes saved successfully', 'success');
                    return true;
                } else {
                    const error = await putResponse.json();
                    addLog(`[!] GitHub error: ${error.message}`, 'error');
                    return false;
                }
            } catch (error) {
                addLog(`[!] Save error: ${error.message}`, 'error');
                return false;
            }
        }

        // ===== TELEGRAM BOT FUNCTIONS (CHINESE) =====
        async function sendMessage(chatId, text, replyMarkup = null) {
            const payload = {
                chat_id: chatId,
                text: text,
                parse_mode: 'HTML'
            };
            if (replyMarkup) payload.reply_markup = JSON.stringify(replyMarkup);
            
            try {
                await fetch(`${API_URL}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
            } catch (error) {
                addLog(`[!] Send error: ${error.message}`, 'error');
            }
        }

        async function sendMainMenu(chatId) {
            const keyboard = {
                inline_keyboard: [
                    [{ text: "查看产品", callback_data: "list_products" }],
                    [{ text: "修改产品", callback_data: "modify_product_start" }],
                    [{ text: "统计数据", callback_data: "stats" }],
                    [{ text: "刷新数据", callback_data: "refresh" }],
                    [{ text: "帮助", callback_data: "help" }]
                ]
            };
            
            const productos = await obtenerProductos();
            const total = productos ? productos.length : 0;
            
            const message = `<b>🤖 元机器人 - 产品管理系统</b>\n\n` +
                           `📦 产品总数: ${total}\n` +
                           `🔐 GitHub状态: ${GITHUB_TOKEN ? "✅ 已连接" : "⚠️ 只读模式"}\n` +
                           `⏰ 系统时间: ${new Date().toLocaleString('zh-CN')}\n\n` +
                           `请选择一个选项:`;
            
            await sendMessage(chatId, message, keyboard);
        }

        async function listProducts(chatId, page = 0) {
            const productos = await obtenerProductos();
            if (!productos || productos.length === 0) {
                await sendMessage(chatId, "❌ 暂无产品数据");
                return;
            }
            
            const itemsPerPage = 5;
            const totalPages = Math.ceil(productos.length / itemsPerPage);
            const startIdx = page * itemsPerPage;
            const endIdx = Math.min(startIdx + itemsPerPage, productos.length);
            
            let message = `<b>📋 产品目录</b>\n`;
            message += `━━━━━━━━━━━━━━━━━━━━━\n`;
            message += `第 ${page + 1} / ${totalPages} 页\n`;
            message += `总计: ${productos.length} 个产品\n`;
            message += `━━━━━━━━━━━━━━━━━━━━━\n\n`;
            
            for (let i = startIdx; i < endIdx; i++) {
                const p = productos[i];
                message += `<b>${i+1}. ${p.name || 'N/A'}</b>\n`;
                message += `🆔 编号: ${p.ID || 'N/A'}\n`;
                message += `💰 价格: ${p.price || 'N/A'}\n`;
                message += `🏷️ 品牌: ${p.brand || 'N/A'}\n`;
                message += `🚚 运费: ${p.shipping || 'N/A'}\n\n`;
            }
            
            const keyboard = { inline_keyboard: [] };
            const navButtons = [];
            if (page > 0) navButtons.push({ text: "◀️ 上一页", callback_data: `page_${page-1}` });
            if (page < totalPages - 1) navButtons.push({ text: "下一页 ▶️", callback_data: `page_${page+1}` });
            if (navButtons.length > 0) keyboard.inline_keyboard.push(navButtons);
            keyboard.inline_keyboard.push([{ text: "🏠 主菜单", callback_data: "main_menu" }]);
            
            await sendMessage(chatId, message, keyboard);
        }

        async function showStats(chatId) {
            const productos = await obtenerProductos();
            if (!productos || productos.length === 0) {
                await sendMessage(chatId, "❌ 暂无统计数据");
                return;
            }
            
            const marcas = {};
            const precios = [];
            
            for (const p of productos) {
                const marca = p.brand || '未知品牌';
                marcas[marca] = (marcas[marca] || 0) + 1;
                const precio = parseFloat((p.price || '0').replace('$', ''));
                if (!isNaN(precio)) precios.push(precio);
            }
            
            const marcaTop = Object.keys(marcas).reduce((a, b) => marcas[a] > marcas[b] ? a : b, 'N/A');
            const precioMin = precios.length ? Math.min(...precios) : 0;
            const precioMax = precios.length ? Math.max(...precios) : 0;
            const precioProm = precios.length ? precios.reduce((a,b) => a+b, 0) / precios.length : 0;
            
            const message = `<b>📊 系统统计数据</b>\n\n` +
                           `📦 产品总数: ${productos.length}\n` +
                           `🏷️ 品牌数量: ${Object.keys(marcas).length}\n` +
                           `⭐ 最常见品牌: ${marcaTop}\n\n` +
                           `💰 价格统计\n` +
                           `   最低价: $${precioMin.toFixed(2)}\n` +
                           `   最高价: $${precioMax.toFixed(2)}\n` +
                           `   平均价: $${precioProm.toFixed(2)}`;
            
            const keyboard = { inline_keyboard: [[{ text: "🏠 主菜单", callback_data: "main_menu" }]] };
            await sendMessage(chatId, message, keyboard);
        }

        async function modifyProductSelection(chatId) {
            const productos = await obtenerProductos();
            if (!productos || productos.length === 0) {
                await sendMessage(chatId, "❌ 暂无产品数据");
                return;
            }
            
            const keyboard = { inline_keyboard: [] };
            for (let i = 0; i < Math.min(productos.length, 10); i++) {
                keyboard.inline_keyboard.push([{
                    text: `${productos[i].ID} - ${productos[i].name.substring(0, 30)}`,
                    callback_data: `select_${productos[i].ID}`
                }]);
            }
            keyboard.inline_keyboard.push([{ text: "🏠 主菜单", callback_data: "main_menu" }]);
            
            await sendMessage(chatId, "✏️ 请选择要修改的产品", keyboard);
        }

        async function showModifyOptions(chatId, productId) {
            const productos = await obtenerProductos();
            const producto = productos.find(p => p.ID === productId);
            
            if (!producto) {
                await sendMessage(chatId, "❌ 产品未找到");
                return;
            }
            
            userSessions[chatId] = { productId: productId };
            
            const message = `✏️ 修改产品: ${producto.name}\n\n` +
                           `💰 当前价格: ${producto.price}\n` +
                           `🚚 当前运费: ${producto.shipping}\n\n` +
                           `请选择要修改的字段:`;
            
            const keyboard = {
                inline_keyboard: [
                    [{ text: "💰 修改价格", callback_data: `modify_price_${productId}` }],
                    [{ text: "🚚 修改运费", callback_data: `modify_shipping_${productId}` }],
                    [{ text: "◀️ 返回", callback_data: "modify_product_start" }],
                    [{ text: "🏠 主菜单", callback_data: "main_menu" }]
                ]
            };
            
            await sendMessage(chatId, message, keyboard);
        }

        async function processPriceChange(chatId, productId, newPrice) {
            let priceStr = newPrice.replace('$', '');
            const priceNum = parseFloat(priceStr);
            
            if (isNaN(priceNum) || priceNum < 0) {
                await sendMessage(chatId, "❌ 价格格式无效，请输入数字 (例如: 45.99)");
                return;
            }
            
            const formattedPrice = `$${priceNum.toFixed(2)}`;
            const productos = await obtenerProductos();
            const index = productos.findIndex(p => p.ID === productId);
            
            if (index === -1) {
                await sendMessage(chatId, `❌ 产品编号 ${productId} 未找到`);
                return;
            }
            
            const oldPrice = productos[index].price;
            productos[index].price = formattedPrice;
            
            if (await actualizarGitHub(productos)) {
                await sendMessage(chatId, `✅ 价格更新成功\n\n产品: ${productos[index].name}\n原价: ${oldPrice}\n现价: ${formattedPrice}`);
            } else {
                await sendMessage(chatId, "❌ 保存到 GitHub 失败，请检查网络或 Token");
            }
        }

        async function processShippingChange(chatId, productId, newShipping) {
            let shippingStr = newShipping.replace('$', '');
            const shippingNum = parseFloat(shippingStr);
            
            if (isNaN(shippingNum) || shippingNum < 0) {
                await sendMessage(chatId, "❌ 运费格式无效，请输入数字 (例如: 5.99)");
                return;
            }
            
            const formattedShipping = `$${shippingNum.toFixed(2)}`;
            const productos = await obtenerProductos();
            const index = productos.findIndex(p => p.ID === productId);
            
            if (index === -1) {
                await sendMessage(chatId, `❌ 产品编号 ${productId} 未找到`);
                return;
            }
            
            const oldShipping = productos[index].shipping;
            productos[index].shipping = formattedShipping;
            
            if (await actualizarGitHub(productos)) {
                await sendMessage(chatId, `✅ 运费更新成功\n\n产品: ${productos[index].name}\n原运费: ${oldShipping}\n现运费: ${formattedShipping}`);
            } else {
                await sendMessage(chatId, "❌ 保存到 GitHub 失败，请检查网络或 Token");
            }
        }

        async function handleCallback(callbackQuery) {
            const chatId = callbackQuery.message?.chat?.id;
            if (!chatId) return;
            
            const data = callbackQuery.data;
            
            try {
                await fetch(`${API_URL}/answerCallbackQuery`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ callback_query_id: callbackQuery.id })
                });
            } catch (e) {}
            
            if (data === "main_menu") await sendMainMenu(chatId);
            else if (data === "list_products") await listProducts(chatId, 0);
            else if (data === "modify_product_start") await modifyProductSelection(chatId);
            else if (data === "stats") await showStats(chatId);
            else if (data === "refresh") {
                await obtenerProductos(true);
                await sendMessage(chatId, "✅ 数据刷新成功");
                await sendMainMenu(chatId);
            }
            else if (data === "help") {
                const helpMsg = `❓ 帮助信息\n\n` +
                               `/start - 显示主菜单\n/list - 查看产品列表\n/stats - 查看统计数据\n` +
                               `/change [编号] [价格] - 修改产品价格\n/shipping [编号] [运费] - 修改产品运费\n\n` +
                               `示例:\n/change TY423 45.99\n/shipping EE632 5.99`;
                await sendMessage(chatId, helpMsg);
            }
            else if (data.startsWith("page_")) {
                const page = parseInt(data.split("_")[1]);
                await listProducts(chatId, page);
            }
            else if (data.startsWith("select_")) {
                const productId = data.replace("select_", "");
                await showModifyOptions(chatId, productId);
            }
            else if (data.startsWith("modify_price_")) {
                const productId = data.replace("modify_price_", "");
                userSessions[chatId] = { action: 'waiting_price', productId: productId };
                await sendMessage(chatId, "💰 请输入新的价格 (例如: 45.99):\n输入 /cancel 取消操作");
            }
            else if (data.startsWith("modify_shipping_")) {
                const productId = data.replace("modify_shipping_", "");
                userSessions[chatId] = { action: 'waiting_shipping', productId: productId };
                await sendMessage(chatId, "🚚 请输入新的运费 (例如: 5.99):\n输入 /cancel 取消操作");
            }
        }

        async function handleMessage(message) {
            const chatId = message.chat.id;
            const text = message.text;
            
            if (!text) return;
            
            if (text === '/start') await sendMainMenu(chatId);
            else if (text === '/list') await listProducts(chatId, 0);
            else if (text === '/stats') await showStats(chatId);
            else if (text === '/cancel') {
                delete userSessions[chatId];
                await sendMessage(chatId, "❌ 操作已取消");
                await sendMainMenu(chatId);
            }
            else if (text.startsWith('/change')) {
                const parts = text.split(' ');
                if (parts.length !== 3) await sendMessage(chatId, "❌ 使用方法: /change 产品编号 价格\n示例: /change TY423 45.99");
                else await processPriceChange(chatId, parts[1], parts[2]);
            }
            else if (text.startsWith('/shipping')) {
                const parts = text.split(' ');
                if (parts.length !== 3) await sendMessage(chatId, "❌ 使用方法: /shipping 产品编号 运费\n示例: /shipping TY423 5.99");
                else await processShippingChange(chatId, parts[1], parts[2]);
            }
            else if (userSessions[chatId]) {
                const session = userSessions[chatId];
                if (session.action === 'waiting_price') {
                    await processPriceChange(chatId, session.productId, text);
                    delete userSessions[chatId];
                } else if (session.action === 'waiting_shipping') {
                    await processShippingChange(chatId, session.productId, text);
                    delete userSessions[chatId];
                }
            }
        }

        async function pollTelegram() {
            if (!botActive) return;
            
            try {
                const url = `${API_URL}/getUpdates?timeout=30&offset=${lastUpdateId + 1}`;
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.ok && data.result) {
                    for (const update of data.result) {
                        if (update.update_id > lastUpdateId) {
                            lastUpdateId = update.update_id;
                            if (update.message) await handleMessage(update.message);
                            if (update.callback_query) await handleCallback(update.callback_query);
                        }
                    }
                }
            } catch (error) {
                addLog(`[!] Polling error: ${error.message}`, 'error');
            }
        }

        function startBot() {
            if (botActive) {
                addLog('[!] Bot already running', 'warning');
                return;
            }
            
            botActive = true;
            if (pollingInterval) clearInterval(pollingInterval);
            pollingInterval = setInterval(pollTelegram, 1000);
            updateStatusBar();
            addLog('┌─[ Telegram Bot Started ]', 'success');
            addLog('└─[ Waiting for commands... ]', 'info');
        }

        function stopBot() {
            botActive = false;
            if (pollingInterval) clearInterval(pollingInterval);
            updateStatusBar();
            addLog('┌─[ Bot Stopped ]', 'warning');
            addLog('└─[ Use "start" to restart ]', 'info');
        }

        function sendCommand() {
            const input = document.getElementById('commandInput');
            const command = input.value.trim();
            if (command === 'help' || command === 'h') {
                addLog('┌─[ Available Commands ]', 'info');
                addLog('├─ help, h     - Show this help', 'info');
                addLog('├─ start, s    - Start Telegram bot', 'info');
                addLog('├─ stop        - Stop Telegram bot', 'info');
                addLog('├─ status, st  - Show system status', 'info');
                addLog('├─ clear, c    - Clear terminal', 'info');
                addLog('└─ exit, q     - No effect, just for fun', 'info');
            } else if (command === 'start' || command === 's') {
                startBot();
            } else if (command === 'stop') {
                stopBot();
            } else if (command === 'status' || command === 'st') {
                addLog(`┌─[ System Status ]`, 'info');
                addLog(`├─ Bot: ${botActive ? 'ONLINE' : 'OFFLINE'}`, 'info');
                addLog(`├─ GitHub: ${GITHUB_TOKEN ? 'CONNECTED' : 'READ ONLY'}`, 'info');
                addLog(`└─ Products: ${productosCache ? productosCache.length : 0}`, 'info');
            } else if (command === 'clear' || command === 'c') {
                document.getElementById('terminalContent').innerHTML = '';
                addLog('┌─[ Terminal Cleared ]', 'info');
                addLog('└─[ Type "help" for commands ]', 'info');
            } else if (command === 'exit' || command === 'q') {
                addLog('┌─[ Exiting... ]', 'info');
                addLog('└─[ Just kidding, this is not a real shell ]', 'info');
            } else if (command) {
                addLog(`└─[ Unknown command: ${command} ]`, 'warning');
            }
            input.value = '';
        }

        document.getElementById('commandInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendCommand();
        });

        // Initialization
        window.addEventListener('load', async () => {
            addLog('┌─[ YuanBot System v1.0 ]', 'success');
            addLog('├─[ Initializing modules... ]', 'info');
            addLog('├─[ Connecting to GitHub API... ]', 'info');
            
            const hasToken = loadSavedToken();
            
            if (!hasToken) {
                addLog('├─[ WARNING: GitHub token required ]', 'warning');
                addLog('└─[ Please configure token in the modal ]', 'warning');
            } else {
                addLog('├─[ Token loaded from storage ]', 'info');
                await obtenerProductos();
                addLog('└─[ System ready ]', 'success');
                setTimeout(() => startBot(), 1000);
            }
            
            updateStatusBar();
        });
    </script>
</body>
</html>
