<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YuanBot - Gestor de Productos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1b5e20 0%, #0d3b0f 100%);
            font-family: 'Courier New', 'Monaco', monospace;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Modal de token */
        .modal {
            display: flex;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #0a0a0a;
            border: 2px solid #00ff41;
            border-radius: 16px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            text-align: center;
        }

        .modal-content h2 {
            color: #00ff41;
            margin-bottom: 20px;
        }

        .modal-content p {
            color: #ccc;
            margin-bottom: 20px;
        }

        .token-input {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #00ff41;
            color: #00ff41;
            padding: 12px;
            font-family: monospace;
            font-size: 14px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }

        .token-input:focus {
            outline: none;
            box-shadow: 0 0 10px rgba(0,255,65,0.3);
        }

        .btn-primary {
            background: #00ff41;
            color: #0a0a0a;
            border: none;
            padding: 12px 24px;
            font-family: monospace;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            margin: 5px;
        }

        .btn-primary:hover {
            background: #00cc33;
        }

        .btn-secondary {
            background: #333;
            color: #fff;
            border: none;
            padding: 12px 24px;
            font-family: monospace;
            cursor: pointer;
            border-radius: 8px;
            margin: 5px;
        }

        .bot-status {
            background: #0a0a0a;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px solid #00ff41;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .status-led {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background-color: #ff4444;
            box-shadow: 0 0 10px #ff4444;
            animation: pulse 1s infinite;
        }

        .status-led.active {
            background-color: #00ff41;
            box-shadow: 0 0 10px #00ff41;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .bot-info {
            flex: 1;
        }

        .bot-name {
            font-size: 1.5em;
            color: #00ff41;
            font-weight: bold;
        }

        .bot-stats {
            color: #888;
            font-size: 0.85em;
            margin-top: 5px;
        }

        .control-buttons {
            display: flex;
            gap: 10px;
        }

        .btn {
            background: #1a1a1a;
            border: 1px solid #00ff41;
            color: #00ff41;
            padding: 10px 20px;
            font-family: monospace;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .btn:hover {
            background: #00ff41;
            color: #0a0a0a;
        }

        .btn-danger {
            border-color: #ff4444;
            color: #ff4444;
        }

        .btn-danger:hover {
            background: #ff4444;
            color: #0a0a0a;
        }

        .logs-container {
            background: #0a0a0a;
            border-radius: 12px;
            border: 1px solid #2e7d32;
            overflow: hidden;
        }

        .logs-header {
            background: #1b5e20;
            padding: 12px 20px;
            color: #00ff41;
            font-weight: bold;
            border-bottom: 1px solid #2e7d32;
        }

        .logs-content {
            height: 500px;
            overflow-y: auto;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.6;
        }

        .log-entry {
            margin-bottom: 6px;
            padding: 4px 8px;
            border-left: 3px solid #00ff41;
            animation: slideIn 0.2s ease;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .log-entry.error { border-left-color: #ff4444; color: #ff8888; }
        .log-entry.success { border-left-color: #00ff88; color: #00ff88; }
        .log-entry.warning { border-left-color: #ffaa00; color: #ffaa44; }
        .log-entry.bot { border-left-color: #0088ff; color: #66aaff; }

        .timestamp {
            color: #666;
            margin-right: 12px;
        }

        .command-panel {
            margin-top: 20px;
            background: #0a0a0a;
            border-radius: 12px;
            padding: 15px;
            border: 1px solid #2e7d32;
        }

        .command-input-group {
            display: flex;
            gap: 10px;
        }

        .command-input {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #2e7d32;
            color: #00ff41;
            padding: 12px 15px;
            font-family: monospace;
            font-size: 14px;
            border-radius: 6px;
        }

        .command-input:focus {
            outline: none;
            border-color: #00ff41;
        }

        .logs-content::-webkit-scrollbar {
            width: 8px;
        }

        .logs-content::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        .logs-content::-webkit-scrollbar-thumb {
            background: #00ff41;
            border-radius: 4px;
        }

        .token-status {
            margin-top: 10px;
            font-size: 12px;
        }

        .token-valid {
            color: #00ff41;
        }

        .token-invalid {
            color: #ff4444;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="bot-status">
            <div class="status-indicator">
                <div class="status-led" id="statusLed"></div>
                <div class="bot-info">
                    <div class="bot-name">🤖 YuanBot - Gestor de Productos</div>
                    <div class="bot-stats" id="botStats">
                        Estado: Esperando token...
                    </div>
                </div>
                <div class="control-buttons">
                    <button class="btn" onclick="startBot()">▶ INICIAR BOT</button>
                    <button class="btn btn-danger" onclick="stopBot()">⏹ DETENER BOT</button>
                </div>
            </div>
        </div>

        <div class="logs-container">
            <div class="logs-header">
                📋 CONSOLA DEL BOT
            </div>
            <div class="logs-content" id="logsContent">
                <div class="log-entry info">
                    <span class="timestamp"></span> [SISTEMA] Página cargada.
                </div>
            </div>
        </div>

        <div class="command-panel">
            <div class="command-input-group">
                <input type="text" id="commandInput" class="command-input" placeholder="Escribe un comando...">
                <button class="btn" onclick="sendCommand()">ENVIAR</button>
            </div>
        </div>
    </div>

    <!-- Modal para ingresar el token -->
    <div id="tokenModal" class="modal">
        <div class="modal-content">
            <h2>🔑 CONFIGURACIÓN REQUERIDA</h2>
            <p>Ingresa tu GitHub Personal Access Token para que el bot pueda guardar los cambios.</p>
            <p style="font-size: 12px; color: #ffaa44;">El token se guardará SOLO en tu navegador local, no en el repositorio.</p>
            <input type="password" id="tokenInput" class="token-input" placeholder="Pega tu token de GitHub aquí">
            <div>
                <button class="btn-primary" onclick="saveToken()">✅ GUARDAR TOKEN</button>
                <button class="btn-secondary" onclick="skipToken()">⚠️ USAR SIN GUARDAR (solo lectura)</button>
            </div>
            <div id="tokenMessage" class="token-status"></div>
        </div>
    </div>

    <script>
        // ===== CONFIGURACIÓN =====
        const BOT_TOKEN = "8762418416:AAH02l_pssUwIM1uzyD2VmdK6NZ3tvPo398";
        const REPO_OWNER = "dcvxk";
        const REPO_NAME = "Yuan24-7.github.io";
        const FILE_PATH = "productos.json";
        
        // Variables
        let GITHUB_TOKEN = null;
        let botActive = false;
        let pollingInterval = null;
        let lastUpdateId = 0;
        let productosCache = null;
        let cacheTimestamp = 0;
        let userSessions = {};
        
        const API_URL = `https://api.telegram.org/bot${BOT_TOKEN}`;
        const RAW_URL = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/${FILE_PATH}`;
        const GITHUB_API_URL = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`;

        function addLog(message, type = 'info') {
            const logsDiv = document.getElementById('logsContent');
            const logEntry = document.createElement('div');
            logEntry.className = `log-entry ${type}`;
            const timestamp = new Date().toLocaleTimeString();
            logEntry.innerHTML = `<span class="timestamp">[${timestamp}]</span> ${message}`;
            logsDiv.appendChild(logEntry);
            logEntry.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            while (logsDiv.children.length > 500) logsDiv.removeChild(logsDiv.firstChild);
        }

        function updateBotStatus(status, details = '') {
            const led = document.getElementById('statusLed');
            const stats = document.getElementById('botStats');
            if (status === 'active') {
                led.classList.add('active');
                stats.innerHTML = `✅ Bot activo | ${details}`;
            } else {
                led.classList.remove('active');
                stats.innerHTML = `⭕ Bot detenido | ${details}`;
            }
        }

        // Cifrado simple (solo para ocultar visualmente, no es seguridad real)
        function simpleEncode(str) {
            return btoa(str);
        }

        function simpleDecode(str) {
            try {
                return atob(str);
            } catch(e) {
                return null;
            }
        }

        // Guardar token en localStorage (solo en el navegador del usuario)
        function saveToken() {
            const tokenInput = document.getElementById('tokenInput');
            const token = tokenInput.value.trim();
            
            if (!token) {
                document.getElementById('tokenMessage').innerHTML = '❌ Por favor ingresa un token';
                document.getElementById('tokenMessage').className = 'token-status token-invalid';
                return;
            }
            
            // Guardar token cifrado localmente
            const encodedToken = simpleEncode(token);
            localStorage.setItem('github_token_enc', encodedToken);
            GITHUB_TOKEN = token;
            
            document.getElementById('tokenMessage').innerHTML = '✅ Token guardado correctamente (solo en tu navegador)';
            document.getElementById('tokenMessage').className = 'token-status token-valid';
            
            // Probar el token
            testToken();
            
            setTimeout(() => {
                document.getElementById('tokenModal').style.display = 'none';
                addLog('🔑 Token de GitHub configurado correctamente', 'success');
                addLog('📝 Los cambios se guardarán en tu repositorio de GitHub', 'info');
            }, 1500);
        }

        function skipToken() {
            document.getElementById('tokenModal').style.display = 'none';
            GITHUB_TOKEN = null;
            addLog('⚠️ Modo solo lectura: Los cambios NO se guardarán en GitHub', 'warning');
            addLog('💡 Para guardar cambios, recarga la página e ingresa un token válido', 'info');
        }

        async function testToken() {
            if (!GITHUB_TOKEN) return false;
            
            try {
                const response = await fetch('https://api.github.com/user', {
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                
                if (response.ok) {
                    const user = await response.json();
                    addLog(`✅ Token válido - Usuario: ${user.login}`, 'success');
                    
                    // Probar acceso al repo
                    const repoTest = await fetch(GITHUB_API_URL, {
                        headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
                    });
                    if (repoTest.ok) {
                        addLog(`✅ Acceso confirmado al repositorio`, 'success');
                        return true;
                    } else {
                        addLog(`⚠️ El token no tiene acceso al repositorio`, 'warning');
                        return false;
                    }
                } else {
                    addLog(`❌ Token inválido. Verifica que tenga permisos 'repo'`, 'error');
                    return false;
                }
            } catch (error) {
                addLog(`❌ Error probando token: ${error.message}`, 'error');
                return false;
            }
        }

        // Cargar token guardado al inicio
        function loadSavedToken() {
            const encoded = localStorage.getItem('github_token_enc');
            if (encoded) {
                const decoded = simpleDecode(encoded);
                if (decoded && decoded.startsWith('ghp_')) {
                    GITHUB_TOKEN = decoded;
                    document.getElementById('tokenModal').style.display = 'none';
                    addLog('🔑 Token cargado desde almacenamiento local', 'success');
                    testToken();
                    return true;
                }
            }
            return false;
        }

        // ===== FUNCIONES DE GITHUB =====
        async function obtenerProductos(forceRefresh = false) {
            const now = Date.now() / 1000;
            
            if (!forceRefresh && productosCache && (now - cacheTimestamp) < 30) {
                addLog(`📦 Usando cache (${productosCache.length} productos)`, 'info');
                return productosCache;
            }
            
            try {
                addLog(`🌐 Descargando productos desde GitHub...`, 'info');
                const response = await fetch(RAW_URL);
                
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const data = await response.json();
                
                if (data && data.products) {
                    productosCache = data.products;
                    cacheTimestamp = now;
                    addLog(`✅ ${productosCache.length} productos cargados`, 'success');
                    return productosCache;
                }
                
                productosCache = [];
                return [];
                
            } catch (error) {
                addLog(`❌ Error al cargar: ${error.message}`, 'error');
                return productosCache || [];
            }
        }

        async function actualizarGitHub(productos) {
            if (!GITHUB_TOKEN) {
                addLog(`⚠️ No se puede guardar: No hay token de GitHub configurado`, 'warning');
                return false;
            }
            
            try {
                addLog(`📤 Guardando en GitHub...`, 'info');
                
                const getResponse = await fetch(GITHUB_API_URL, {
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                
                let sha = null;
                if (getResponse.ok) {
                    const data = await getResponse.json();
                    sha = data.sha;
                }
                
                const dataToUpload = { products: productos };
                const contenidoJson = JSON.stringify(dataToUpload, null, 2);
                const contenidoBase64 = btoa(unescape(encodeURIComponent(contenidoJson)));
                
                const putData = {
                    message: `Actualizado por bot - ${new Date().toLocaleString()}`,
                    content: contenidoBase64,
                    branch: "main"
                };
                
                if (sha) putData.sha = sha;
                
                const putResponse = await fetch(GITHUB_API_URL, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(putData)
                });
                
                if (putResponse.ok) {
                    cacheTimestamp = 0;
                    addLog(`✅ Cambios guardados en GitHub`, 'success');
                    return true;
                } else {
                    const error = await putResponse.json();
                    addLog(`❌ Error GitHub: ${error.message}`, 'error');
                    return false;
                }
            } catch (error) {
                addLog(`❌ Error al guardar: ${error.message}`, 'error');
                return false;
            }
        }

        // ===== FUNCIONES DEL BOT =====
        async function sendMessage(chatId, text, replyMarkup = null) {
            const payload = {
                chat_id: chatId,
                text: text,
                parse_mode: 'HTML'
            };
            if (replyMarkup) payload.reply_markup = JSON.stringify(replyMarkup);
            
            try {
                await fetch(`${API_URL}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
            } catch (error) {
                addLog(`Error enviando mensaje: ${error.message}`, 'error');
            }
        }

        async function sendMainMenu(chatId) {
            const keyboard = {
                inline_keyboard: [
                    [{ text: "📋 VER PRODUCTOS", callback_data: "list_products" }],
                    [{ text: "✏️ MODIFICAR PRODUCTO", callback_data: "modify_product_start" }],
                    [{ text: "📊 ESTADISTICAS", callback_data: "stats" }],
                    [{ text: "🔄 REFRESCAR", callback_data: "refresh" }]
                ]
            };
            
            const productos = await obtenerProductos();
            const total = productos ? productos.length : 0;
            const tokenStatus = GITHUB_TOKEN ? "✅ Configurado" : "⚠️ Solo lectura";
            
            const message = `🤖 <b>GESTOR DE PRODUCTOS YUAN</b>\n\n` +
                           `📦 Productos: ${total}\n` +
                           `🔑 GitHub: ${tokenStatus}\n` +
                           `⏰ ${new Date().toLocaleTimeString()}\n\n` +
                           `Seleccione una opción:`;
            
            await sendMessage(chatId, message, keyboard);
        }

        async function listProducts(chatId, page = 0) {
            const productos = await obtenerProductos();
            if (!productos || productos.length === 0) {
                await sendMessage(chatId, "❌ No hay productos disponibles");
                return;
            }
            
            const itemsPerPage = 5;
            const totalPages = Math.ceil(productos.length / itemsPerPage);
            const startIdx = page * itemsPerPage;
            const endIdx = Math.min(startIdx + itemsPerPage, productos.length);
            
            let message = `📋 <b>CATALOGO DE PRODUCTOS</b>\n`;
            message += `━━━━━━━━━━━━━━━━━━━━━\n`;
            message += `Página ${page + 1} de ${totalPages}\n`;
            message += `Total: ${productos.length} productos\n`;
            message += `━━━━━━━━━━━━━━━━━━━━━\n\n`;
            
            for (let i = startIdx; i < endIdx; i++) {
                const p = productos[i];
                message += `<b>${i+1}. ${p.name || 'N/A'}</b>\n`;
                message += `🆔 ID: ${p.ID || 'N/A'}\n`;
                message += `💰 Precio: ${p.price || 'N/A'}\n`;
                message += `🏷️ Marca: ${p.brand || 'N/A'}\n`;
                message += `🚚 Envío: ${p.shipping || 'N/A'}\n\n`;
            }
            
            const keyboard = { inline_keyboard: [] };
            const navButtons = [];
            if (page > 0) navButtons.push({ text: "◀️ ANTERIOR", callback_data: `page_${page-1}` });
            if (page < totalPages - 1) navButtons.push({ text: "SIGUIENTE ▶️", callback_data: `page_${page+1}` });
            if (navButtons.length > 0) keyboard.inline_keyboard.push(navButtons);
            keyboard.inline_keyboard.push([{ text: "🏠 MENU PRINCIPAL", callback_data: "main_menu" }]);
            
            await sendMessage(chatId, message, keyboard);
        }

        async function showStats(chatId) {
            const productos = await obtenerProductos();
            if (!productos || productos.length === 0) {
                await sendMessage(chatId, "❌ No hay datos disponibles");
                return;
            }
            
            const marcas = {};
            const precios = [];
            
            for (const p of productos) {
                const marca = p.brand || 'Sin marca';
                marcas[marca] = (marcas[marca] || 0) + 1;
                const precio = parseFloat((p.price || '$0').replace('$', ''));
                if (!isNaN(precio)) precios.push(precio);
            }
            
            const marcaTop = Object.keys(marcas).reduce((a, b) => marcas[a] > marcas[b] ? a : b, 'N/A');
            const precioMin = precios.length ? Math.min(...precios) : 0;
            const precioMax = precios.length ? Math.max(...precios) : 0;
            const precioProm = precios.length ? precios.reduce((a,b) => a+b, 0) / precios.length : 0;
            
            const message = `📊 <b>ESTADISTICAS</b>\n\n` +
                           `📦 Total: ${productos.length}\n` +
                           `🏷️ Marcas: ${Object.keys(marcas).length}\n` +
                           `⭐ Marca común: ${marcaTop}\n\n` +
                           `💰 Precios\n` +
                           `   Mín: $${precioMin.toFixed(2)}\n` +
                           `   Máx: $${precioMax.toFixed(2)}\n` +
                           `   Prom: $${precioProm.toFixed(2)}`;
            
            const keyboard = { inline_keyboard: [[{ text: "🏠 MENU PRINCIPAL", callback_data: "main_menu" }]] };
            await sendMessage(chatId, message, keyboard);
        }

        async function modifyProductSelection(chatId) {
            const productos = await obtenerProductos();
            if (!productos || productos.length === 0) {
                await sendMessage(chatId, "❌ No hay productos");
                return;
            }
            
            const keyboard = { inline_keyboard: [] };
            for (let i = 0; i < Math.min(productos.length, 10); i++) {
                keyboard.inline_keyboard.push([{
                    text: `${productos[i].ID} - ${productos[i].name.substring(0, 30)}`,
                    callback_data: `select_${productos[i].ID}`
                }]);
            }
            keyboard.inline_keyboard.push([{ text: "🏠 MENU PRINCIPAL", callback_data: "main_menu" }]);
            
            await sendMessage(chatId, "✏️ <b>SELECCIONE PRODUCTO</b>", keyboard);
        }

        async function showModifyOptions(chatId, productId) {
            const productos = await obtenerProductos();
            const producto = productos.find(p => p.ID === productId);
            
            if (!producto) {
                await sendMessage(chatId, "❌ Producto no encontrado");
                return;
            }
            
            userSessions[chatId] = { productId: productId };
            
            const message = `✏️ <b>MODIFICAR: ${producto.name}</b>\n\n` +
                           `💰 Precio: ${producto.price}\n` +
                           `🚚 Envío: ${producto.shipping}\n\n` +
                           `¿Qué modificar?`;
            
            const keyboard = {
                inline_keyboard: [
                    [{ text: "💰 PRECIO", callback_data: `modify_price_${productId}` }],
                    [{ text: "🚚 ENVIO", callback_data: `modify_shipping_${productId}` }],
                    [{ text: "◀️ VOLVER", callback_data: "modify_product_start" }],
                    [{ text: "🏠 MENU", callback_data: "main_menu" }]
                ]
            };
            
            await sendMessage(chatId, message, keyboard);
        }

        async function processPriceChange(chatId, productId, newPrice) {
            let priceStr = newPrice.replace('$', '');
            const priceNum = parseFloat(priceStr);
            
            if (isNaN(priceNum) || priceNum < 0) {
                await sendMessage(chatId, "❌ Precio inválido");
                return;
            }
            
            const formattedPrice = `$${priceNum.toFixed(2)}`;
            const productos = await obtenerProductos();
            const index = productos.findIndex(p => p.ID === productId);
            
            if (index === -1) {
                await sendMessage(chatId, "❌ Producto no encontrado");
                return;
            }
            
            const oldPrice = productos[index].price;
            productos[index].price = formattedPrice;
            
            if (await actualizarGitHub(productos)) {
                await sendMessage(chatId, `✅ PRECIO ACTUALIZADO\n\nProducto: ${productos[index].name}\nAntes: ${oldPrice}\nAhora: ${formattedPrice}`);
            } else {
                await sendMessage(chatId, "❌ Error al guardar. ¿Configuraste el token de GitHub?");
            }
        }

        async function processShippingChange(chatId, productId, newShipping) {
            let shippingStr = newShipping.replace('$', '');
            const shippingNum = parseFloat(shippingStr);
            
            if (isNaN(shippingNum) || shippingNum < 0) {
                await sendMessage(chatId, "❌ Costo inválido");
                return;
            }
            
            const formattedShipping = `$${shippingNum.toFixed(2)}`;
            const productos = await obtenerProductos();
            const index = productos.findIndex(p => p.ID === productId);
            
            if (index === -1) {
                await sendMessage(chatId, "❌ Producto no encontrado");
                return;
            }
            
            const oldShipping = productos[index].shipping;
            productos[index].shipping = formattedShipping;
            
            if (await actualizarGitHub(productos)) {
                await sendMessage(chatId, `✅ ENVIO ACTUALIZADO\n\nProducto: ${productos[index].name}\nAntes: ${oldShipping}\nAhora: ${formattedShipping}`);
            } else {
                await sendMessage(chatId, "❌ Error al guardar. ¿Configuraste el token de GitHub?");
            }
        }

        async function handleCallback(callbackQuery) {
            const chatId = callbackQuery.message?.chat?.id;
            if (!chatId) return;
            
            const data = callbackQuery.data;
            
            try {
                await fetch(`${API_URL}/answerCallbackQuery`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ callback_query_id: callbackQuery.id })
                });
            } catch (e) {}
            
            addLog(`🔘 Callback: ${data}`, 'bot');
            
            if (data === "main_menu") await sendMainMenu(chatId);
            else if (data === "list_products") await listProducts(chatId, 0);
            else if (data === "modify_product_start") await modifyProductSelection(chatId);
            else if (data === "stats") await showStats(chatId);
            else if (data === "refresh") {
                await obtenerProductos(true);
                await sendMessage(chatId, "✅ Datos actualizados");
                await sendMainMenu(chatId);
            }
            else if (data.startsWith("page_")) {
                const page = parseInt(data.split("_")[1]);
                await listProducts(chatId, page);
            }
            else if (data.startsWith("select_")) {
                const productId = data.replace("select_", "");
                await showModifyOptions(chatId, productId);
            }
            else if (data.startsWith("modify_price_")) {
                const productId = data.replace("modify_price_", "");
                userSessions[chatId] = { action: 'waiting_price', productId: productId };
                await sendMessage(chatId, "💰 Ingrese nuevo precio (ej: 45.99):");
            }
            else if (data.startsWith("modify_shipping_")) {
                const productId = data.replace("modify_shipping_", "");
                userSessions[chatId] = { action: 'waiting_shipping', productId: productId };
                await sendMessage(chatId, "🚚 Ingrese nuevo envío (ej: 5.99):");
            }
        }

        async function handleMessage(message) {
            const chatId = message.chat.id;
            const text = message.text;
            
            if (!text) return;
            
            addLog(`📨 Mensaje: ${text}`, 'bot');
            
            if (text === '/start') await sendMainMenu(chatId);
            else if (text === '/list') await listProducts(chatId, 0);
            else if (text === '/stats') await showStats(chatId);
            else if (text === '/cancel') {
                delete userSessions[chatId];
                await sendMessage(chatId, "❌ Cancelado");
                await sendMainMenu(chatId);
            }
            else if (text.startsWith('/change')) {
                const parts = text.split(' ');
                if (parts.length !== 3) await sendMessage(chatId, "❌ Uso: /change ID precio");
                else await processPriceChange(chatId, parts[1], parts[2]);
            }
            else if (text.startsWith('/shipping')) {
                const parts = text.split(' ');
                if (parts.length !== 3) await sendMessage(chatId, "❌ Uso: /shipping ID costo");
                else await processShippingChange(chatId, parts[1], parts[2]);
            }
            else if (userSessions[chatId]) {
                const session = userSessions[chatId];
                if (session.action === 'waiting_price') {
                    await processPriceChange(chatId, session.productId, text);
                    delete userSessions[chatId];
                } else if (session.action === 'waiting_shipping') {
                    await processShippingChange(chatId, session.productId, text);
                    delete userSessions[chatId];
                }
            }
        }

        async function pollTelegram() {
            if (!botActive) return;
            
            try {
                const url = `${API_URL}/getUpdates?timeout=30&offset=${lastUpdateId + 1}`;
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.ok && data.result) {
                    for (const update of data.result) {
                        if (update.update_id > lastUpdateId) {
                            lastUpdateId = update.update_id;
                            if (update.message) await handleMessage(update.message);
                            if (update.callback_query) await handleCallback(update.callback_query);
                        }
                    }
                }
            } catch (error) {
                addLog(`Error polling: ${error.message}`, 'error');
            }
        }

        function startBot() {
            if (botActive) return;
            botActive = true;
            if (pollingInterval) clearInterval(pollingInterval);
            pollingInterval = setInterval(pollTelegram, 1000);
            updateBotStatus('active', 'Bot funcionando');
            addLog("🤖 BOT INICIADO", 'success');
        }

        function stopBot() {
            botActive = false;
            if (pollingInterval) clearInterval(pollingInterval);
            updateBotStatus('stopped', 'Bot detenido');
            addLog("⏹️ BOT DETENIDO", 'warning');
        }

        function sendCommand() {
            const input = document.getElementById('commandInput');
            const command = input.value.trim();
            if (command) {
                addLog(`⌨️ Comando: ${command}`, 'info');
                input.value = '';
            }
        }

        // Inicializar
        window.addEventListener('load', async () => {
            addLog("🌿 Sistema de Gestión de Productos Yuan", 'success');
            addLog("🔐 El token de GitHub se guarda SOLO en tu navegador", 'info');
            
            // Intentar cargar token guardado
            const hasToken = loadSavedToken();
            
            if (!hasToken) {
                addLog("⚠️ Se requiere un token de GitHub para guardar cambios", 'warning');
                addLog("📝 Si no tienes token, puedes usar el bot en modo solo lectura", 'warning');
            } else {
                await obtenerProductos();
            }
            
            addLog("✅ Listo! Presiona INICIAR BOT", 'success');
            
            // Auto-iniciar después de 2 segundos si hay token
            setTimeout(() => {
                if (hasToken) startBot();
            }, 2000);
        });
    </script>
</body>
